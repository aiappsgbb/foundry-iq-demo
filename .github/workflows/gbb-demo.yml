name: GBB Demo

on:
  workflow_dispatch:
  # Uncomment the below lines to run the workflow on commit
  # push:
  #   branches:
  #     - main

# Required for Azure federated credential (OIDC) login
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: "GBB demo"
    env:
      # azd built-in variables (set via `azd pipeline config` or GitHub environment vars)
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || format('rg-{0}', vars.AZURE_ENV_NAME) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Python is needed by the postprovision hook (configure_search_objects.py)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install azd
        uses: Azure/setup-azd@v2.1.0

      - name: Log in with Azure (Federated Credentials)
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Log in with azd (Federated Credentials)
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        run: |
          azd auth login `
            --client-id "$Env:AZURE_CLIENT_ID" `
            --federated-credential-provider "github" `
            --tenant-id "$Env:AZURE_TENANT_ID"
        shell: pwsh

      - name: Create Resource Group (if needed)
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            RG_EXISTS=$(az group exists --name "$AZURE_RESOURCE_GROUP" --subscription "$AZURE_SUBSCRIPTION_ID")
            if [ "$RG_EXISTS" = "true" ]; then
              echo "Resource group '$AZURE_RESOURCE_GROUP' already exists"
            else
              echo "Creating resource group '$AZURE_RESOURCE_GROUP'..."
              az group create \
                --name "$AZURE_RESOURCE_GROUP" \
                --location "$AZURE_LOCATION" \
                --subscription "$AZURE_SUBSCRIPTION_ID"
            fi

      # Check if the Container App already exists in the resource group.
      # This prevents ResourceNotFound errors when azd tries to fetch the
      # current image from a previously-deleted Container App.
      - name: Detect Container App existence
        id: check-app
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            APP_NAME=$(az containerapp list \
              -g "$AZURE_RESOURCE_GROUP" \
              --subscription "$AZURE_SUBSCRIPTION_ID" \
              --query "[?tags.\"azd-service-name\"=='web'].name | [0]" \
              -o tsv 2>/dev/null || echo "")
            if [ -n "$APP_NAME" ]; then
              echo "Container App found: $APP_NAME"
              echo "app-exists=true" >> $GITHUB_OUTPUT
            else
              echo "No Container App found for service 'web'"
              echo "app-exists=false" >> $GITHUB_OUTPUT
            fi

      # azd provision deploys Bicep (ACA, ACR, Search, Foundry, Storage, RBAC)
      # and triggers the postprovision hook which configures search objects + uploads sample data
      - name: Provision Infrastructure
        run: azd provision --no-prompt
        env:
          AZD_INITIAL_ENVIRONMENT_CONFIG: ${{ secrets.AZD_INITIAL_ENVIRONMENT_CONFIG }}
          SERVICE_WEB_RESOURCE_EXISTS: ${{ steps.check-app.outputs.app-exists }}

      # azd deploy builds the Docker image remotely in ACR and updates the Container App
      - name: Deploy Application
        run: azd deploy --no-prompt